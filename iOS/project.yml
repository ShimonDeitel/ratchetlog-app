name: RatchetLog
options:
  bundleIdPrefix: com.shimondeitel.ratchetlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  RatchetLog:
    type: application
    platform: iOS
    sources:
      - path: RatchetLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ratchetlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: RatchetLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RatchetLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RatchetLogTests
      - path: RatchetLog.storekit
    dependencies:
      - target: RatchetLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ratchetlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RatchetLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RatchetLogUITests
    dependencies:
      - target: RatchetLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ratchetlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  RatchetLog:
    build:
      targets:
        RatchetLog: all
        RatchetLogTests: [test]
        RatchetLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: RatchetLog.storekit
    test:
      config: Debug
      storeKitConfiguration: RatchetLog.storekit
      targets:
        - RatchetLogTests
        - RatchetLogUITests
    archive:
      config: Release
